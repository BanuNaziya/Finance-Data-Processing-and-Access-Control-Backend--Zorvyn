

# ── Server ─────────────────────────────────────────────────────────────────────
# Port the server listens on (http://localhost:3000)
server.port=3000

# ── H2 Database (File-Based) ────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:file:./finance_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ORM ────────────────────────────────────────────────────────
# H2 dialect — tells Hibernate which SQL flavor to use
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


spring.jpa.hibernate.ddl-auto=update

# Show generated SQL in console (helpful for debugging, turn off in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false


jwt.secret=finance_super_secret_key_zorvyn_2026_assignment_minimum_256_bits_long

# Token expiry in milliseconds (7 days = 7 * 24 * 60 * 60 * 1000)
jwt.expiration=604800000

# ── Logging ────────────────────────────────────────────────────────────────────
# Set log level for our application package to DEBUG for detailed output
logging.level.com.finance.backend=DEBUG
# Spring Security debug logging (shows which filters run)
logging.level.org.springframework.security=INFO
